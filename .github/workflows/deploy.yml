name: Production Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Security gate (high severity blocks)
        run: npm audit --omit=dev --audit-level=high

      - name: Auth boundary gate
        env:
          JWT_SECRET: ci-test-secret
        run: npm run test:core

      - name: Install and test
        run: |
          npm run test:all
          npm run production-readiness -- --skip-install

      - name: Prelaunch gate
        env:
          HANNA_DEPLOY_REQUIRE_FULL_REHEARSAL: ${{ vars.HANNA_DEPLOY_REQUIRE_FULL_REHEARSAL }}
          HANNA_FULL_REHEARSAL_TARGET: ${{ vars.HANNA_FULL_REHEARSAL_TARGET }}
          HANNA_FULL_REHEARSAL_MODULES: ${{ vars.HANNA_FULL_REHEARSAL_MODULES }}
        run: |
          PRELAUNCH_GATE_ARGS=(
            --require-check preflight
            --require-check smart_summary
            --require-check focused_regression
            --require-check contract_provenance
          )

          require_full_rehearsal="$(printf '%s' "${HANNA_DEPLOY_REQUIRE_FULL_REHEARSAL:-0}" | tr '[:upper:]' '[:lower:]')"
          if [[ "$require_full_rehearsal" == "1" || "$require_full_rehearsal" == "true" || "$require_full_rehearsal" == "yes" ]]; then
            if [[ -z "${HANNA_FULL_REHEARSAL_TARGET:-}" ]]; then
              echo "HANNA_FULL_REHEARSAL_TARGET is required when HANNA_DEPLOY_REQUIRE_FULL_REHEARSAL is enabled" >&2
              exit 2
            fi
            HANNA_RUN_FULL_REHEARSAL=1 \
            HANNA_FULL_REHEARSAL_TARGET="$HANNA_FULL_REHEARSAL_TARGET" \
            HANNA_FULL_REHEARSAL_MODULES="${HANNA_FULL_REHEARSAL_MODULES:-full-spectrum}" \
            ./scripts/prelaunch_check.sh
            PRELAUNCH_GATE_ARGS+=(--require-check full_rollout_rehearsal)
          else
            ./scripts/prelaunch_check.sh
          fi

          SUMMARY="$(ls -1dt .cache/prelaunch/* | head -n1)/final-summary.json"
          ./scripts/prelaunch_gate.sh "$SUMMARY" "${PRELAUNCH_GATE_ARGS[@]}"

      - name: Build Docker image
        run: |
          docker build -f Dockerfile.prod -t hanna:${{ github.sha }} .
          docker tag hanna:${{ github.sha }} hanna:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/hanna
            docker compose -f docker-compose.prod.yml pull || true
            docker compose -f docker-compose.prod.yml up -d --build
            docker system prune -f
