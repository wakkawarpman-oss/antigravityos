stages:
  - prelaunch
  - release-verdict

variables:
  PRELAUNCH_BUNDLE_DIR: "${CI_PROJECT_DIR}/.cache/prelaunch/${CI_COMMIT_REF_SLUG}"

before_script:
  - apt-get update -y
  - apt-get install -y python3 python3-pip
  - python3 -m pip install --upgrade pip

prelaunch:
  stage: prelaunch
  script:
    - |
      export HANNA_PRELAUNCH_OUT_DIR="${PRELAUNCH_BUNDLE_DIR}"
      export HANNA_PRELAUNCH_OUTPUT_DIR="${PRELAUNCH_BUNDLE_DIR}"
      export HANNA_PRELAUNCH_STRICT_BY_GATE=1
      export HANNA_PRELAUNCH_REQUIRED_CHECKS="preflight,focused_regression,tor_policy"
      export HANNA_TOR_ENABLED=1
      export HANNA_TOR_PROXY_URL="socks5h://127.0.0.1:9050"
      export HANNA_TOR_REQUIRE_SOCKS5H=1
      export HANNA_RUN_FULL_REHEARSAL=1
      export HANNA_FULL_REHEARSAL_MODULES="pd-infra-quick"
      export HANNA_FULL_REHEARSAL_REPORT_MODE="shareable"
    - mkdir -p "${PRELAUNCH_BUNDLE_DIR}"
    - bash scripts/prelaunch_check.sh
  artifacts:
    paths:
      - "${PRELAUNCH_BUNDLE_DIR}/final-summary.json"
      - "${PRELAUNCH_BUNDLE_DIR}/gate-result.json"
      - "${PRELAUNCH_BUNDLE_DIR}/pytest.err"
      - "${PRELAUNCH_BUNDLE_DIR}/full-rehearsal.err"
      - "${PRELAUNCH_BUNDLE_DIR}/status.txt"
    expire_in: 1 week

release-verdict:
  stage: release-verdict
  script:
    - pip install pytest
    - |
      python3 scripts/analyze_release_verdict_with_logs.py \
        "${PRELAUNCH_BUNDLE_DIR}/final-summary.json" \
        "${PRELAUNCH_BUNDLE_DIR}/gate-result.json" \
        "${PRELAUNCH_BUNDLE_DIR}/pytest.err" \
        "${PRELAUNCH_BUNDLE_DIR}/full-rehearsal.err" \
        --tor-policy --rc
  allow_failure: false
