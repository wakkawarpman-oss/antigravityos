server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: hanna-json-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: hanna
          __path__: /workspace/logs/**/*.log

    pipeline_stages:
      - json:
          expressions:
            level: level
            adapter: adapter
            target: target
            error: error
            stage: stage
      - labels:
          level:
          adapter:
          stage:

  - job_name: hanna-run-artifacts
    static_configs:
      - targets:
          - localhost
        labels:
          job: hanna-runs
          __path__: /workspace/runs/**/*.log
