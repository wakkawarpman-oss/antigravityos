# Core runtime sizing (production baseline)
nifi.flow.engine.threads=16
nifi.bored.yield.duration=10 ms
nifi.flowfile.repository.write.threads=8

# Enable HTTP UI for local operations
authorizers.xml.location=./conf/authorizers.xml
login.identity.provider.configuration.file=./conf/login-identity-providers.xml
nifi.web.http.host=
nifi.web.http.port=8080

# Keep logs in mapped path
nifi.bootstrap.listen.port=0
